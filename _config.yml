title: CoBot Clasificador de Colores
description: UR3 · Visión Artificial · Cinemática Inversa
theme: just-the-docs

color_scheme: dark

url: ""
baseurl: "/proyecto_robotica_primavera2026"

# Navegación
nav_sort: order

# Búsqueda
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "Elias Santiago Jiménez Hernández &mdash; Control Avanzado de Robots 2025 &mdash; IBERO"

# Plugins
plugins:
  - jekyll-seo-tag

# Aux links
aux_links:
  "Repositorio GitHub":
    - "https://github.com/elias-sjh/cobot-clasificador"

aux_links_new_tab: true

# Back to top
back_to_top: true
back_to_top_text: "Subir"

# Last edited
last_edit_time_stamp: "%d %b %Y, %H:%M"

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Importante
    color: blue
  new:
    title: Nuevo
    color: green
  note:
    title: Nota
    color: purple
  warning:
    title: Advertencia
    color: red

# MathJax
math: mathjax

kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
