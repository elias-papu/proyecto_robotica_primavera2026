title: CoBot Clasificador de Colores
description: "UR3 · Visión Artificial · Cinemática Inversa · IBERO 2026"
theme: just-the-docs

# Color scheme — usamos el default (claro) + override en custom CSS
color_scheme: light

url: ""
baseurl: "/proyecto_robotica_primavera2026"

# Navegación
nav_sort: order
nav_fold: false

# Búsqueda
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Footer
footer_content: >
  <strong>Elias Santiago Jiménez Hernández</strong> &mdash;
  Ingeniería Mecatrónica, 8° semestre &mdash;
  <em>Control Avanzado</em> &mdash; IBERO Ciudad de México · 2026

# Aux links
aux_links:
  "🏆 3er Lugar · Día de las Ingenierías 2026":
    - "reconocimiento"

aux_links_new_tab: false

# Back to top
back_to_top: true
back_to_top_text: "↑ Subir"

# MathJax para ecuaciones
math: mathjax

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Importante
    color: blue
  note:
    title: Nota
    color: purple
  warning:
    title: Advertencia
    color: red

kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

plugins:
  - jekyll-seo-tag
